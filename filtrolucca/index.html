<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <title>Lucca 1 Ano - Câmera Pro</title>
    <style>
        :root { --accent: #25D366; --primary: #FF5722; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: #000; color: #fff; overflow: hidden; width: 100vw; height: 100dvh; font-family: sans-serif; }

        .stage { position: relative; width: 100%; height: 100%; overflow: hidden; }
        
        /* Elementos base: vídeo e moldura sempre ocupando tudo */
        video, #molduraPreview, #iosFinalImage, #videoPreview, .gallery-bg { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; 
        }
        
        video.mirrored { transform: scaleX(-1); }
        #molduraPreview { z-index: 10; pointer-events: none; }
        #iosFinalImage, #videoPreview { display: none; z-index: 25; background: #000; }
        .gallery-bg { z-index: 5; display: none; }

        /* Camada de Interface */
        .ui-layer { position: absolute; inset: 0; z-index: 30; display: flex; flex-direction: column; justify-content: space-between; padding: 40px 20px; pointer-events: none; }
        .top-bar, .controls-bottom, .post-actions { pointer-events: auto; }

        .top-bar { display: flex; justify-content: center; gap: 10px; }
        .btn-small { background: rgba(0,0,0,0.6); border: 1px solid #fff; color: #fff; padding: 8px 12px; border-radius: 15px; font-size: 11px; font-weight: bold; }
        .btn-small.active { border-color: var(--accent); color: var(--accent); box-shadow: 0 0 8px var(--accent); }

        /* Área dos botões invisíveis (Hit Areas) */
        .controls-bottom { display: flex; flex-direction: column; align-items: center; width: 100%; }
        .custom-wrapper { position: relative; width: 100vw; max-width: 500px; }
        .arte-botoes { width: 100%; pointer-events: none; display: block; }
        
        .hit-areas { position: absolute; inset: 0; display: flex; justify-content: center; align-items: center; gap: 8px; }
        .btn-hit { opacity: 0; cursor: pointer; border: none; background: transparent; }
        .area-gal { width: 15%; height: 60%; }
        .area-foto { width: 20%; height: 80%; }
        .area-vid { width: 25%; height: 90%; }
        .area-boom { width: 18%; height: 70%; }

        #timerLabel { background: red; color: #fff; padding: 2px 10px; border-radius: 8px; font-size: 12px; font-weight: bold; display: none; margin-bottom: 5px; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        /* Ações Pós-Captura */
        .post-actions { display: none; flex-direction: column; gap: 10px; width: 100%; max-width: 280px; margin: 0 auto; z-index: 40; }
        .btn-main { width: 100%; padding: 14px; border-radius: 12px; border: none; font-weight: bold; font-size: 14px; color: white; cursor: pointer; }
        .btn-share { background: var(--accent); }
        .btn-cancel { background: #444; }

        #startScreen { position: fixed; inset: 0; background: #000 url('capajpg.jpg') center/cover; z-index: 100; display: flex; align-items: center; justify-content: center; }
        .flash { position: absolute; inset: 0; background: #fff; opacity: 0; pointer-events: none; z-index: 50; transition: opacity 0.1s; }
    </style>
</head>
<body>

    <div class="stage">
        <video id="camera" autoplay playsinline muted></video>
        <img id="galleryPreview" class="gallery-bg" />
        <img id="molduraPreview" src="moldura1.png" />
        <video id="videoPreview" playsinline loop muted controls></video>
        <img id="iosFinalImage" />
        <div class="flash" id="flash"></div>

        <div class="ui-layer" id="cameraUI" style="display: none;">
            <div class="top-bar">
                <button class="btn-small" onclick="switchCamera()">🔄 INVERTER</button>
                <button class="btn-small active" id="btnM1" onclick="changeFrame('moldura1.png', 'm1')">FOTO 1</button>
                <button class="btn-small" id="btnM2" onclick="changeFrame('moldura2.png', 'm2')">FOTO 2</button>
            </div>

            <div class="controls-bottom">
                <div id="timerLabel">REC</div>
                <div class="custom-wrapper">
                    <img src="botoes.png" class="arte-botoes">
                    <div class="hit-areas">
                        <button class="btn-hit area-gal" onclick="document.getElementById('fileInput').click()"></button>
                        <button class="btn-hit area-foto" onclick="capturePhoto()"></button>
                        <button class="btn-hit area-vid" onclick="toggleVideo()"></button>
                        <button class="btn-hit area-boom" onclick="captureBoomerang()"></button>
                    </div>
                </div>
            </div>
        </div>

        <div class="ui-layer" id="resultUI" style="display: none; background: rgba(0,0,0,0.8); justify-content: center;">
            <div class="post-actions" id="postActions">
                <button onclick="shareResult()" class="btn-main btn-share">📤 SALVAR E COMPARTILHAR</button>
                <button onclick="resetAll()" class="btn-main btn-cancel">VOLTAR</button>
            </div>
        </div>
    </div>

    <div id="startScreen">
        <button class="btn-main" style="background: #FF5722; width: 200px;" onclick="startApp()">ENTRAR</button>
    </div>

    <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="handleGallery(event)">
    <canvas id="canvasFinal" width="1080" height="1920" style="display:none;"></canvas>

    <script>
        let stream = null;
        let isFront = true;
        let currentFrame = 'moldura1.png';
        let isGallery = false;
        let recorder, chunks = [], isRecording = false;
        let finalUrl = null, finalType = 'image';

        const videoEl = document.getElementById('camera');
        const molduraEl = document.getElementById('molduraPreview');
        const canvas = document.getElementById('canvasFinal');
        const ctx = canvas.getContext('2d');

        async function startApp() {
            if (stream) stream.getTracks().forEach(t => t.stop());
            try {
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: isFront ? "user" : "environment", width: 1280 },
                    audio: true 
                });
                videoEl.srcObject = stream;
                videoEl.classList.toggle('mirrored', isFront);
                document.getElementById('startScreen').style.display = 'none';
                document.getElementById('cameraUI').style.display = 'flex';
            } catch (e) { alert("Câmera indisponível. Verifique permissões HTTPS."); }
        }

        function switchCamera() { isFront = !isFront; startApp(); }

        function changeFrame(url, id) {
            currentFrame = url;
            molduraEl.src = url;
            document.getElementById('btnM1').classList.toggle('active', id === 'm1');
            document.getElementById('btnM2').classList.toggle('active', id === 'm2');
        }

        function handleGallery(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const img = document.getElementById('galleryPreview');
                    img.src = ev.target.result;
                    img.style.display = 'block';
                    videoEl.style.display = 'none';
                    isGallery = true;
                };
                reader.readAsDataURL(file);
            }
        }

        function drawToCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            if (!isGallery && isFront) { ctx.translate(canvas.width, 0); ctx.scale(-1, 1); }
            
            const source = isGallery ? document.getElementById('galleryPreview') : videoEl;
            const sW = source.videoWidth || source.naturalWidth;
            const sH = source.videoHeight || source.naturalHeight;
            const aspect = Math.max(canvas.width / sW, canvas.height / sH);
            const dW = sW * aspect;
            const dH = sH * aspect;
            
            ctx.drawImage(source, (canvas.width - dW) / 2, (canvas.height - dH) / 2, dW, dH);
            ctx.restore();
            ctx.drawImage(molduraEl, 0, 0, canvas.width, canvas.height);
        }

        // --- CAPTURA DE FOTO ---
        function capturePhoto() {
            const flash = document.getElementById('flash');
            flash.style.opacity = '1'; setTimeout(() => flash.style.opacity = '0', 100);
            
            drawToCanvas();
            finalUrl = canvas.toDataURL('image/jpeg', 0.9);
            finalType = 'image';
            
            document.getElementById('iosFinalImage').src = finalUrl;
            document.getElementById('iosFinalImage').style.display = 'block';
            showResult();
        }

        // --- CAPTURA DE VÍDEO ---
        function toggleVideo() {
            if (!isRecording) startRec(); else stopRec();
        }

        function captureBoomerang() {
            startRec();
            setTimeout(() => { if(isRecording) stopRec(); }, 3200);
        }

        function startRec() {
            isRecording = true;
            chunks = [];
            document.getElementById('timerLabel').style.display = 'block';
            
            const cStream = canvas.captureStream(30);
            if(stream.getAudioTracks().length) cStream.addTrack(stream.getAudioTracks()[0]);

            const options = { mimeType: 'video/mp4; codecs=avc1.42E01E, mp4a.40.2' };
            if (!MediaRecorder.isTypeSupported(options.mimeType)) delete options.mimeType;

            recorder = new MediaRecorder(cStream, options);
            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'video/mp4' });
                finalUrl = URL.createObjectURL(blob);
                finalType = 'video';
                const vPrev = document.getElementById('videoPreview');
                vPrev.src = finalUrl;
                vPrev.style.display = 'block';
                vPrev.play();
                showResult();
            };
            
            recorder.start();
            function loop() { if(isRecording) { drawToCanvas(); requestAnimationFrame(loop); } }
            loop();
        }

        function stopRec() {
            isRecording = false;
            document.getElementById('timerLabel').style.display = 'none';
            recorder.stop();
        }

        function showResult() {
            document.getElementById('cameraUI').style.display = 'none';
            document.getElementById('resultUI').style.display = 'flex';
            document.getElementById('postActions').style.display = 'flex';
        }

        async function shareResult() {
            const blob = await fetch(finalUrl).then(r => r.blob());
            const ext = finalType === 'image' ? 'jpg' : 'mp4';
            const file = new File([blob], `filtro_lucca.${ext}`, { type: blob.type });

            if (navigator.canShare && navigator.canShare({ files: [file] })) {
                await navigator.share({ files: [file] });
            } else {
                const a = document.createElement('a');
                a.href = finalUrl;
                a.download = `arquivo.${ext}`;
                a.click();
            }
        }

        function resetAll() { location.reload(); }
    </script>
</body>
</html>
