<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <title>Filtro Pro - Lucca</title>
    <style>
        :root { --accent: #25D366; --record: #ff0000; --boom: #e1306c; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: #000; color: #fff; overflow: hidden; width: 100vw; height: 100dvh; font-family: sans-serif; }

        .stage { position: relative; width: 100%; height: 100%; overflow: hidden; background: #000; touch-action: none; }
        #camera { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; }
        #camera.mirrored { transform: scaleX(-1); }

        #editorCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 80; background: #000; display: none; touch-action: none; }
        #iosImg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain; z-index: 150; display: none; background: #000; }

        #canvasFinal { display: none; }
        #videoPreview { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain; z-index: 100; background: #000; display: none; }
        #molduraImagePreview { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain; object-position: bottom; pointer-events: none; z-index: 15; display: none; }
        
        .ui-layer { position: absolute; inset: 0; pointer-events: none; z-index: 30; display: flex; flex-direction: column; justify-content: space-between; padding: 40px 20px; }
        .top-bar { display: flex; justify-content: space-between; pointer-events: auto; width: 100%; }
        
        .btn-m { padding: 10px 16px; background: rgba(0,0,0,0.6); border: 2px solid rgba(255,255,255,0.3); border-radius: 20px; color: #fff; cursor: pointer; font-weight: bold; font-size: 12px; }
        .btn-m.active { border-color: var(--accent); background: rgba(37, 211, 102, 0.4); }

        .controls-bottom { display: flex; flex-direction: column; align-items: center; pointer-events: auto; width: 100%; }
        .custom-controls-wrapper { position: relative; width: 100%; display: flex; justify-content: center; align-items: center; min-height: 140px; }
        .arte-botoes-bg { position: absolute; bottom: -5px; width: 100vw; max-width: 500px; pointer-events: none; z-index: 1; }
        
        .capture-controls { position: relative; z-index: 99; display: flex; gap: 10px; align-items: center; }
        .btn-hidden { opacity: 0; cursor: pointer; border: none; background: transparent; outline: none; }
        .area-galeria { width: 55px; height: 55px; }
        .area-foto { width: 75px; height: 75px; }
        .area-video { width: 95px; height: 95px; }
        .area-boom { width: 65px; height: 65px; }

        #videoTimer { background: var(--record); color: white; padding: 5px 15px; border-radius: 10px; font-weight: bold; display: none; margin-bottom: 10px; }

        #editUI { position: absolute; inset: 0; z-index: 90; display: none; flex-direction: column; justify-content: flex-end; align-items: center; padding-bottom: 60px; pointer-events: none; }
        #editUI button { pointer-events: auto; }

        #resultUI { position: absolute; inset: 0; z-index: 200; display: none; flex-direction: column; justify-content: flex-end; align-items: center; padding-bottom: 60px; pointer-events: auto; background: rgba(0,0,0,0.8); }
        .btn-res { width: 85%; padding: 18px; margin: 8px; border-radius: 20px; border: none; font-weight: bold; font-size: 16px; color: #fff; cursor: pointer; text-align: center; text-decoration: none; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        
        #startScreen { position: absolute; inset: 0; background: #000 url('capajpg.jpg') center/cover; display: flex; align-items: center; justify-content: center; z-index: 1000; }
        #startBtn { padding: 18px 45px; font-size: 18px; border-radius: 40px; border: none; background: #FF5722; color: #fff; font-weight: bold; cursor: pointer; }
        
        .boom-msg { position: absolute; top: 50%; background: rgba(0,0,0,0.8); padding: 20px; border-radius: 15px; display: none; z-index: 300; }
    </style>
</head>
<body>

<div class="stage" id="mainStage">
    <video id="camera" autoplay playsinline muted></video>
    <canvas id="editorCanvas"></canvas>
    <img id="iosImg" />
    <canvas id="canvasFinal"></canvas>
    <video id="videoPreview" playsinline controls loop muted></video>
    <img id="molduraImagePreview" src="moldura1.png" />
    
    <div id="boomMsg" class="boom-msg">🚀 PROCESSANDO BOOMERANG...</div>

    <div id="cameraUI" class="ui-layer" style="display:none;">
        <div class="top-bar">
            <button class="btn-m" id="switchBtn">🔄 INVERTER</button>
            <div class="moldura-selector">
                <button id="m1Btn" class="btn-m active">FOTO 1</button>
                <button id="m2Btn" class="btn-m">FOTO 2</button>
            </div>
        </div>
        <div class="controls-bottom">
            <div id="videoTimer">00:00</div>
            <div class="custom-controls-wrapper">
                <img src="botoes.png" class="arte-botoes-bg">
                <div class="capture-controls">
                    <button id="galleryBtn" class="btn-hidden area-galeria"></button>
                    <input type="file" id="fileInput" accept="image/*" style="display:none;">
                    <button id="capturePhotoBtn" class="btn-hidden area-foto"></button>
                    <button id="captureVideoBtn" class="btn-hidden area-video"></button>
                    <button id="boomerangBtn" class="btn-hidden area-boom"></button>
                </div>
            </div>
        </div>
    </div>

    <div id="editUI">
        <div style="margin-bottom:20px; font-weight: bold; text-shadow: 1px 1px 3px #000;">AJUSTE COM OS DEDOS</div>
        <button id="confirmEditBtn" class="btn-res" style="background:var(--accent);">✅ CONFIRMAR FOTO</button>
        <button id="cancelEditBtn" class="btn-res" style="background:#444;">❌ CANCELAR</button>
    </div>

    <div id="resultUI">
        <button id="mainActionBtn" class="btn-res" style="background:var(--accent);">📤 COMPARTILHAR / SALVAR</button>
        <button id="backToCameraBtn" class="btn-res" style="background:#444;">🔄 TIRAR OUTRA</button>
    </div>
    
    <div id="startScreen"><button id="startBtn">INICIAR CÂMERA</button></div>
</div>

<script>
const MOLDURAS = { 'm1': 'moldura1.png', 'm2': 'moldura2.png' };
let currentKey = 'm1', isFront = true, stream = null;
let isEditing = false, galleryImg = new Image(), animId = null;
let transform = { x: 0, y: 0, sc: 1, lx: 0, ly: 0, ld: 0 };
let mediaRecorder, recordedChunks = [], isRecording = false, boomFrames = [];
let currentFileUrl = null, currentFileType = 'image';

const video = document.getElementById('camera'), editor = document.getElementById('editorCanvas'), eCtx = editor.getContext('2d');
const cFinal = document.getElementById('canvasFinal'), ctxF = cFinal.getContext('2d');
const molduraImg = document.getElementById('molduraImagePreview'), fileInput = document.getElementById('fileInput');
const iosImg = document.getElementById('iosImg'), vPreview = document.getElementById('videoPreview');

document.getElementById('startBtn').onclick = initCamera;
document.getElementById('switchBtn').onclick = () => { isFront = !isFront; initCamera(); };
document.getElementById('m1Btn').onclick = () => switchMoldura('m1');
document.getElementById('m2Btn').onclick = () => switchMoldura('m2');
document.getElementById('backToCameraBtn').onclick = () => location.reload();

async function initCamera() {
    if(stream) stream.getTracks().forEach(t => t.stop());
    try {
        stream = await navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: isFront ? 'user' : 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }, 
            audio: true 
        });
        video.srcObject = stream;
        video.classList.toggle('mirrored', isFront);
        document.getElementById('startScreen').style.display = 'none';
        document.getElementById('cameraUI').style.display = 'flex';
        switchMoldura(currentKey);
    } catch (e) { alert("Erro ao acessar câmera."); }
}

function switchMoldura(key) {
    currentKey = key;
    molduraImg.src = MOLDURAS[key];
    document.getElementById('m1Btn').classList.toggle('active', key === 'm1');
    document.getElementById('m2Btn').classList.toggle('active', key === 'm2');
}

// --- CAPTURA FOTO ---
document.getElementById('capturePhotoBtn').onclick = () => {
    cFinal.width = 1080; cFinal.height = 1920;
    renderToCanvas(ctxF, 1080, 1920);
    showResult(cFinal.toDataURL('image/jpeg', 0.95), 'image');
};

// --- CAPTURA VÍDEO ---
document.getElementById('captureVideoBtn').onclick = () => {
    if (!isRecording) startRecording(false);
    else stopRecording();
};

document.getElementById('boomerangBtn').onclick = () => startRecording(true);

function startRecording(isBoom) {
    isRecording = true; recordedChunks = []; boomFrames = [];
    if (!isBoom) document.getElementById('videoTimer').style.display = 'block';
    
    cFinal.width = 720; cFinal.height = 1280;
    if (isBoom) {
        let count = 0;
        const interval = setInterval(() => {
            if (count > 30 || !isRecording) { clearInterval(interval); processBoom(); }
            const frame = document.createElement('canvas');
            frame.width = 720; frame.height = 1280;
            renderToCanvas(frame.getContext('2d'), 720, 1280, true);
            boomFrames.push(frame);
            count++;
        }, 40);
    } else {
        const cStream = cFinal.captureStream(30);
        const mime = MediaRecorder.isTypeSupported('video/mp4') ? 'video/mp4' : 'video/webm';
        mediaRecorder = new MediaRecorder(cStream, { mimeType: mime });
        mediaRecorder.ondataavailable = e => recordedChunks.push(e.data);
        mediaRecorder.onstop = () => {
            const blob = new Blob(recordedChunks, { type: 'video/mp4' });
            showResult(URL.createObjectURL(blob), 'video');
        };
        mediaRecorder.start();
        recLoop();
    }
}

function recLoop() {
    if (!isRecording) return;
    renderToCanvas(ctxF, 720, 1280);
    requestAnimationFrame(recLoop);
}

function stopRecording() {
    isRecording = false;
    document.getElementById('videoTimer').style.display = 'none';
    if (mediaRecorder) mediaRecorder.stop();
}

function processBoom() {
    isRecording = false;
    document.getElementById('boomMsg').style.display = 'block';
    const pingPong = [...boomFrames, ...[...boomFrames].reverse()];
    const cStream = cFinal.captureStream(30);
    const rec = new MediaRecorder(cStream, { mimeType: 'video/mp4' });
    rec.ondataavailable = e => recordedChunks.push(e.data);
    rec.onstop = () => {
        document.getElementById('boomMsg').style.display = 'none';
        showResult(URL.createObjectURL(new Blob(recordedChunks, { type: 'video/mp4' })), 'video');
    };
    rec.start();
    let i = 0;
    const itv = setInterval(() => {
        if (i >= pingPong.length) { clearInterval(itv); rec.stop(); }
        else { ctxF.drawImage(pingPong[i], 0, 0); i++; }
    }, 40);
}

function renderToCanvas(ctx, w, h, ignoreMoldura = false) {
    ctx.save();
    if (isFront) { ctx.translate(w, 0); ctx.scale(-1, 1); }
    const r = video.videoWidth / video.videoHeight;
    let dw = w, dh = w / r;
    if (dh < h) { dh = h; dw = h * r; }
    ctx.drawImage(video, (w-dw)/2, (h-dh)/2, dw, dh);
    ctx.restore();
    if (!ignoreMoldura) ctx.drawImage(molduraImg, 0, 0, w, h);
}

// --- RESULTADO E SHARE ---
async function showResult(url, type) {
    currentFileUrl = url;
    currentFileType = type;
    document.getElementById('cameraUI').style.display = 'none';
    document.getElementById('resultUI').style.display = 'flex';
    
    if (type === 'image') {
        iosImg.src = url; iosImg.style.display = 'block'; vPreview.style.display = 'none';
    } else {
        vPreview.src = url; vPreview.style.display = 'block'; iosImg.style.display = 'none'; vPreview.play();
    }

    document.getElementById('mainActionBtn').onclick = async () => {
        const response = await fetch(currentFileUrl);
        const blob = await response.blob();
        const ext = currentFileType === 'image' ? 'jpg' : 'mp4';
        const file = new File([blob], `lucca_${Date.now()}.${ext}`, { type: currentFileType === 'image' ? 'image/jpeg' : 'video/mp4' });
        
        if (navigator.canShare && navigator.canShare({ files: [file] })) {
            await navigator.share({ files: [file] });
        } else {
            const a = document.createElement('a');
            a.href = currentFileUrl;
            a.download = `arquivo.${ext}`;
            a.click();
        }
    };
}

// --- GALERIA ---
document.getElementById('galleryBtn').onclick = () => fileInput.click();
fileInput.onchange = e => {
    if (e.target.files[0]) {
        const reader = new FileReader();
        reader.onload = ev => {
            galleryImg = new Image();
            galleryImg.onload = () => {
                isEditing = true;
                document.getElementById('cameraUI').style.display = 'none';
                document.getElementById('editUI').style.display = 'flex';
                editor.style.display = 'block';
                editor.width = window.innerWidth; editor.height = window.innerHeight;
                const ratio = Math.min(editor.width / galleryImg.width, editor.height / galleryImg.height);
                transform = { x: (editor.width - galleryImg.width * ratio) / 2, y: (editor.height - galleryImg.height * ratio) / 2, sc: ratio, lx: 0, ly: 0, ld: 0 };
                renderEditor();
            };
            galleryImg.src = ev.target.result;
        };
        reader.readAsDataURL(e.target.files[0]);
    }
};

function renderEditor() {
    if (!isEditing) return;
    eCtx.fillStyle = "#000"; eCtx.fillRect(0, 0, editor.width, editor.height);
    eCtx.save();
    eCtx.translate(transform.x, transform.y);
    eCtx.scale(transform.sc, transform.sc);
    eCtx.drawImage(galleryImg, 0, 0);
    eCtx.restore();
    eCtx.drawImage(molduraImg, 0, 0, editor.width, editor.height);
    animId = requestAnimationFrame(renderEditor);
}

document.getElementById('confirmEditBtn').onclick = () => {
    isEditing = false; cancelAnimationFrame(animId);
    cFinal.width = 1080; cFinal.height = 1920;
    const s = 1080 / editor.width;
    ctxF.save(); ctxF.translate(transform.x * s, transform.y * s); ctxF.scale(transform.sc * s, transform.sc * s);
    ctxF.drawImage(galleryImg, 0, 0); ctxF.restore();
    ctxF.drawImage(molduraImg, 0, 0, 1080, 1920);
    showResult(cFinal.toDataURL('image/jpeg', 0.95), 'image');
};

document.getElementById('cancelEditBtn').onclick = () => location.reload();

// GESTOS GALERIA
editor.addEventListener('touchstart', e => {
    if (e.touches.length === 1) { transform.lx = e.touches[0].clientX - transform.x; transform.ly = e.touches[0].clientY - transform.y; }
    else if (e.touches.length === 2) { transform.ld = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY); }
});
editor.addEventListener('touchmove', e => {
    e.preventDefault();
    if (e.touches.length === 1) { transform.x = e.touches[0].clientX - transform.lx; transform.y = e.touches[0].clientY - transform.ly; }
    else if (e.touches.length === 2) {
        const d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
        transform.sc *= (d / transform.ld); transform.ld = d;
    }
}, {passive: false});
</script>
</body>
</html>
